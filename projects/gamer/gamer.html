<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
    <title>OpenWorldGame</title>
</head>
<body>
    <script>
        function setup(){
            cw = 600
            ch = 600
            let cnv = createCanvas(cw,ch)
            cnv.position((windowWidth-width)/2, (windowHeight-height)/2);
            frameRate(60)
        }
        //initial coordinates for player
        x=200
        y=200
        //amount of rooms from 0,0
        n=2
        roomMatrix = [0,0]
        //valueset for rectangles
        rectMatrixX = [
            [100],[200],[300],[400],[500]
        ]
        rectMatrixY = [
            [100],[200],[300],[400],[500]
        ]
        function draw(){
            //used to check which room player is in
            r = (Math.abs(parseInt(roomMatrix[0])) * Math.abs(parseInt(roomMatrix[1]))*255)/(2*n)
            console.log(r)
            background(r,0,0)
            // rect test
            rect(rectMatrixX[parseInt(roomMatrix[0])+n][0], rectMatrixY[parseInt(roomMatrix[1])+n][0] ,50,100)
            fill(255)
            rectMode(CENTER)
            //movement
            if (keyIsDown(LEFT_ARROW)===true){
                x-=5
            }
            if (keyIsDown(RIGHT_ARROW)===true){
                x+=5

            }
            if (keyIsDown(UP_ARROW)===true){
                y-=5

            }
            if (keyIsDown(DOWN_ARROW)===true){
                y+=5
            }
            //room switching
            if (y<0 && parseInt(roomMatrix[1]) > -n){
                y=ch-25
                roomMatrix[1]=parseInt(roomMatrix[1])-1
                console.log(roomMatrix[1])
            }
            if(y>ch && parseInt(roomMatrix[1]) < n){
                y=25
                roomMatrix[1] = parseInt(roomMatrix[1])+1
                console.log(roomMatrix[1])
            }
            if(x>cw && parseInt(roomMatrix[0]) < n){
                x=25
                roomMatrix[0] = parseInt(roomMatrix[0])+1
                console.log(roomMatrix[0])
            }
            if(x<0 && parseInt(roomMatrix[0]) > -n){
                x=cw-25
                roomMatrix[0] = parseInt(roomMatrix[0])-1
                console.log(roomMatrix[0])
            }
            //draw square
            square(x,y,30)
        }
    </script>
</body>
</html>
